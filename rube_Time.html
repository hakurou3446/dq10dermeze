<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>ルベランギスタイマー</title>
</head>

<body>
    <!-- <link rel="stylesheet" href="./bootstrap.css"> -->
    <h1>ルベランギスタイマー</h1>
    <table width="300" border="1">
        <tr>
            <td id="yellow">線上</td>
            <td id="purple">金網</td>
            <td id="red">外周</td>
        </tr>
    </table>

    <div>
        <caption>次の床</caption>
        <table width="300" border="1" name="nextFloorTime">
            <tr>
                <td id="nextMinutes">分</td>
                <td id="nextSecond">秒</td>
                <td id="nextOther">安置</td>
            </tr>
        </table>
    </div>
    <p>開始時間</p>
    <div>
        サークルカラミティ
        <input placeholder="床が出てきた時間を入力" type="text" id="startTime">
        <input type="button" class="btn btn-primary" value="計算" onclick="calcStart()">
    </div>
    <div>
        グランドカラミティ
        <input placeholder="例：7分30秒→730" type="text" id="startTime2">
        <input type="button" class="btn btn-primary" value="計算" onclick="calcStart2()">
    </div>
    <div>
        補正用
        <input type="button" class="fix_75_minus" value="－" onclick="minusCount75()">
        <input type="text" id="fix_75" value="1" style="width: 15pt;">
        <input type="button" class="fix_75_plus" value="＋" onclick="plusCount75()">
    </div>
    <!-- <div>
        補正用
        <input type="button" class="fix_25_minus" value="－" onclick="minusCount25()">
        <input type="text" id="fix_25" value="1" style="width: 15pt;">
        <input type="button" class="fix_25_plus" value="＋" onclick="plusCount25()">
    </div> -->

    <div id="result">
    </div>

    <div id="test"></div>

    <style>
        table {
            font-size: 20pt;
        }
        
        #yellow {
            background: yellow;
        }
        
        #rainbow {
            background: linear-gradient(to right, #f59090, #fcd8a1, #fff8b1, #a5d4ad, #a3bce2, #a59aca, #cfa7cd);
        }
        
        #blue {
            background-color: rgb(79, 237, 248);
            /* border: double thick red; */
        }
        
        #purple {
            background: rgba(212, 0, 255, 0.39);
        }
        
        #red {
            background: rgba(255, 53, 53, 0.418);
        }
        
        #nextMinutes_blue,
        #nextSecond_blue,
        #nextMinutes,
        #nextSecond,
        #nextOther {
            width: 150pt;
        }
        
        #tbl {
            table-layout: fixed;
        }
        
        #tbl>tr>#blue,
        #tbl>tr>#yellow {
            text-align: center;
        }
    </style>
    <script src="rube_calcu_bomb.js" charset="utf-8"></script>
</body>

</html>
